<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>くすりを管理 | Medication Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1 class="brand">Medication Log</h1>
      <div class="menu-wrap">
        <button
          class="menu-button"
          type="button"
          aria-expanded="false"
          aria-controls="site-menu"
          aria-label="メニューを開く"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
        <nav class="menu-panel" id="site-menu">
          <a href="index.html">ホームに戻る</a>
          <a href="manage.html" aria-current="page">くすりを管理</a>
        </nav>
      </div>
    </header>

    <main class="content">
      <section class="manage-panel">

        <form class="medicine-form" data-medicine-form>
          <label class="input-label" for="medicine-name">Name</label>
          <div class="form-row">
            <input
              id="medicine-name"
              name="name"
              type="text"
              autocomplete="off"
              placeholder="薬の名前を入力"
              required
            >
            <button class="add-button" type="submit">Add</button>
          </div>
        </form>

        <p class="status-message" data-status-message aria-live="polite"></p>

        <section class="medicine-list" aria-labelledby="medicine-list-title">
          <div class="list-header">
            <h3 id="medicine-list-title">くすり一覧</h3>
          </div>
          <div class="medicine-feed" data-medicine-list></div>
        </section>
      </section>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
